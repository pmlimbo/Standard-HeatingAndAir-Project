<!DOCTYPE html>
<html>
<head>
    <title>Employee Timesheet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f7fa;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: #fff;
        }

        .header img {
            max-width: 150px;
        }

        .nav {
            text-align: center;
            margin: 10px 0;
        }

        .card {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,.1);
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #1e3a5f;
            color: white;
            border: none;
        }

        /* 🔥 DROPDOWN FIX */
        .dropdown-wrapper {
            position: relative;
        }

        .dropdown-list {
        position: relative;   /* 🔥 CHANGE THIS */
        width: 100%;
        max-height: 200px;
        overflow-y: auto;

        background: white;
        border: 1px solid #ccc;
        margin-top: 5px;

        display: none;
       }

        .dropdown-item {
            padding: 8px;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: #eee;
        }
    /* FIX DROPDOWN POSITIONING */
    .dropdown-wrapper {
        position: relative;
    }

    /* THIS IS THE KEY FIX */


    /* Prevent visual overflow issues */
    .card {
        overflow: visible;   /* 🔥 THIS FIXES THE "cut off / hanging" issue */
    }
        </style>
    </head>

    <body>
    .dropdown-item {
        border-bottom: 1px solid #eee;
    }

    .dropdown-item:last-child {
        border-bottom: none;
    }
{% load static %}

<div class="header">
    <img src="{% static 'core/Standard_AC_color_logo.png' %}">
    <h2>Employee Timesheet</h2>
    <a href="https://standardac.com/" target="_blank">Go to Main Website</a>
</div>

<div class="container">

{% if user.is_authenticated %}
<div class="nav">
    <a href="/timesheet/">Timesheet</a>
    <a href="/reports/">Reports</a>

    <form action="/accounts/logout/" method="post" style="display:inline;">
        {% csrf_token %}
        <button style="width:auto;">Logout</button>
    </form>
</div>
{% endif %}

{% block content %}{% endblock %}

</div>

</body>
</html>
