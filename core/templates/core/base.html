<!DOCTYPE html>
<html lang="en">
<head>
    {% load static core_permissions %}
    <meta charset="utf-8">
    <title>Employee Timesheet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f6f8;
            --surface: #ffffff;
            --surface-alt: #eef3f7;
            --text: #1f2933;
            --muted: #52606d;
            --border: #d9e2ec;
            --accent: #1e3a5f;
            --accent-strong: #16324f;
            --danger: #a61b1b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #eef2f6 0%, var(--bg) 100%);
            color: var(--text);
        }

        .header {
            text-align: center;
            padding: 24px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .header img {
            max-width: 150px;
        }

        .header-links {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px;
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 18px 0;
        }

        .card {
            margin-bottom: 16px;
            padding: 18px;
            border: 1px solid rgba(217, 226, 236, 0.8);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            overflow: visible;
        }

        input, select, textarea {
            width: 100%;
            margin-top: 5px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
        }

        button {
            padding: 10px 14px 12px;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-strong);
        }

        a {
            color: var(--accent);
        }

        .button-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 10px 14px 12px;
            border-radius: 6px;
            background: var(--accent);
            color: white;
            text-decoration: none;
        }

        .button-link:hover {
            background: var(--accent-strong);
            color: white;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }

        .header-links a:not(.button-link),
        .nav a,
        .button-row a:not(.button-link) {
            display: inline-flex;
            align-items: center;
            min-height: 42px;
            padding-bottom: 2px;
        }

        .dropdown-wrapper {
            position: relative;
        }

        .dropdown-list {
            position: absolute;
            z-index: 10;
            width: 100%;
            max-height: 220px;
            overflow-y: auto;
            display: none;
            margin-top: 4px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: white;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
        }

        .dropdown-item {
            padding: 8px 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: var(--surface-alt);
        }

        .dropdown-item.is-static {
            cursor: default;
            color: var(--muted);
        }

        .dropdown-item.is-static:hover {
            background: white;
        }

        .entry-row {
            display: grid;
            gap: 12px;
        }

        .summary {
            display: grid;
            gap: 8px;
        }

        .danger-button {
            background: var(--danger);
        }

        .danger-button:hover {
            background: #851616;
        }

        .secondary-button {
            background: #486581;
        }

        .secondary-button:hover {
            background: #334e68;
        }

        .button-link.secondary-button {
            background: #486581;
        }

        .button-link.secondary-button:hover {
            background: #334e68;
        }

        .inline-form {
            display: inline-flex;
            align-items: center;
        }

        .page-title {
            margin-top: 0;
        }

        .muted {
            color: var(--muted);
        }
    </style>
</head>
<body>
<div class="header">
    <img src="{% static 'core/Standard_AC_color_logo.png' %}" alt="Standard AC logo">
    <h2>Employee Timesheet</h2>
    <div class="header-links">
        <a href="https://standardac.com/" target="_blank" rel="noreferrer">Go to Main Website</a>
        {% block header_links_extra %}{% endblock %}
    </div>
</div>

<div class="container">
    {% if user.is_authenticated %}
    <div class="nav">
        <a href="{% url 'timesheet' %}">Timesheet</a>
        {% if user|can_access_reports %}
        <a href="{% url 'reports' %}">Reports</a>
        {% endif %}
        <form action="/accounts/logout/" method="post" class="inline-form">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>
</body>
</html>
