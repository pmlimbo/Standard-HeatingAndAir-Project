{% extends "core/base.html" %}

{% block content %}
<div class="card">
    <h1 class="page-title">Customer List</h1>
    <ul>
        {% for customer in customers %}
            <li>{{ customer.name }} - {{ customer.email }}</li>
        {% empty %}
            <li>No customers yet.</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
